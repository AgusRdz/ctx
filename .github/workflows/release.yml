name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write
  attestations: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Run tests
        run: go test ./... -count=1

      - name: Validate semver tag
        run: |
          if ! echo "${{ github.ref_name }}" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "ERROR: tag '${{ github.ref_name }}' is not valid semver"
            exit 1
          fi

      - name: Build binaries
        run: |
          VERSION=${{ github.ref_name }}
          LDFLAGS="-s -w -X main.version=${VERSION}"
          CGO_ENABLED=0 GOOS=linux   GOARCH=amd64 go build -ldflags="${LDFLAGS}" -o bin/ctx-linux-amd64   ./cmd
          CGO_ENABLED=0 GOOS=linux   GOARCH=arm64 go build -ldflags="${LDFLAGS}" -o bin/ctx-linux-arm64   ./cmd
          CGO_ENABLED=0 GOOS=darwin  GOARCH=amd64 go build -ldflags="${LDFLAGS}" -o bin/ctx-darwin-amd64  ./cmd
          CGO_ENABLED=0 GOOS=darwin  GOARCH=arm64 go build -ldflags="${LDFLAGS}" -o bin/ctx-darwin-arm64  ./cmd
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -ldflags="${LDFLAGS}" -o bin/ctx-windows-amd64.exe ./cmd
          CGO_ENABLED=0 GOOS=windows GOARCH=arm64 go build -ldflags="${LDFLAGS}" -o bin/ctx-windows-arm64.exe ./cmd

      - name: Generate checksums
        run: cd bin && sha256sum ctx-* > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            bin/ctx-linux-amd64
            bin/ctx-linux-arm64
            bin/ctx-darwin-amd64
            bin/ctx-darwin-arm64
            bin/ctx-windows-amd64.exe
            bin/ctx-windows-arm64.exe
            bin/checksums.txt

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: bin/ctx-*

      - name: Update Homebrew formula
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          [ -z "${HOMEBREW_TAP_TOKEN}" ] && echo "HOMEBREW_TAP_TOKEN not set, skipping" && exit 0
          VERSION=${{ github.ref_name }}
          VER=${VERSION#v}
          SHA_DARWIN_ARM64=$(sha256sum bin/ctx-darwin-arm64 | awk '{print $1}')
          SHA_DARWIN_AMD64=$(sha256sum bin/ctx-darwin-amd64 | awk '{print $1}')
          SHA_LINUX_AMD64=$(sha256sum bin/ctx-linux-amd64 | awk '{print $1}')
          SHA_LINUX_ARM64=$(sha256sum bin/ctx-linux-arm64 | awk '{print $1}')
          git clone https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/AgusRdz/homebrew-tap.git tap
          cat > tap/Formula/ctx.rb << FORMULA
          class Ctx < Formula
            desc "Preserve and restore Claude Code session context across compactions"
            homepage "https://github.com/AgusRdz/ctx"
            version "${VER}"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/AgusRdz/ctx/releases/download/${VERSION}/ctx-darwin-arm64"
                sha256 "${SHA_DARWIN_ARM64}"
              else
                url "https://github.com/AgusRdz/ctx/releases/download/${VERSION}/ctx-darwin-amd64"
                sha256 "${SHA_DARWIN_AMD64}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "https://github.com/AgusRdz/ctx/releases/download/${VERSION}/ctx-linux-arm64"
                sha256 "${SHA_LINUX_ARM64}"
              else
                url "https://github.com/AgusRdz/ctx/releases/download/${VERSION}/ctx-linux-amd64"
                sha256 "${SHA_LINUX_AMD64}"
              end
            end

            def install
              binary = Dir["ctx-*"].first
              chmod 0755, binary
              bin.install binary => "ctx"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/ctx --version")
            end
          end
          FORMULA
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/ctx.rb
          git commit -m "ctx ${VERSION}"
          git push
